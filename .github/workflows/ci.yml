name: Build and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Обновлено до v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4  # Обновлено до v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NPM_CONFIG_LEGACY_PEER_DEPS: true

      - name: Run linter
        run: npm run lint || true
        continue-on-error: true

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4  # Обновлено до v4
        with:
          name: dist-${{ matrix.node-version }}
          path: dist/
          retention-days: 5
          if-no-files-found: error
          compression-level: 6

  deploy:
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && success()
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Обновлено до v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4  # Обновлено до v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Prepare deployment files
        run: |
          # Найти и скопировать файлы сборки
          if [ -d "dist-artifacts" ]; then
            mkdir -p dist
            cp -r dist-artifacts/* dist/ 2>/dev/null || true
          fi
          
          # Проверить наличие файлов
          ls -la dist/ || true

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
          commit_message: 'Deploy: ${{ github.event.head_commit.message }}'